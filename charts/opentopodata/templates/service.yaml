apiVersion: v1
kind: Service
metadata:
  name: {{ include "opentopodata.fullname" . }}
  labels:
    {{- include "opentopodata.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  {{- if .Values.service.internalTrafficPolicy }}
  internalTrafficPolicy: {{ .Values.service.internalTrafficPolicy }}
  {{- end }}
  selector:
    {{- include "opentopodata.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
