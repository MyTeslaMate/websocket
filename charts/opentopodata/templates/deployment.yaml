apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "opentopodata.fullname" . }}
  labels:
    {{- include "opentopodata.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "opentopodata.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        # Roll pods when the dataset config changes.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
      labels:
        {{- include "opentopodata.selectorLabels" . | nindent 8 }}
    spec:
      {{- include "opentopodata.affinity" . | nindent 6 }}
      containers:
        - name: opentopodata
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 5000
              protocol: TCP
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.failureThreshold }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.failureThreshold }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: tiles
              mountPath: {{ .Values.data.mountPath }}
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: {{ include "opentopodata.fullname" . }}-config
        - name: tiles
          persistentVolumeClaim:
            claimName: {{ include "opentopodata.pvcName" . }}
            readOnly: true
