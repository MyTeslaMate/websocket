name: Open Topo Data image

# Build Open Topo Data from upstream (ajnisbet/opentopodata), patched for bounded
# memory, and publish to this repo's GHCR. Manual — OTD changes rarely.
on:
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: Upstream Open Topo Data git tag to build
        default: v1.10.0
        required: true
      image_tag:
        description: Image tag to publish (semver)
        default: 1.10.0-beta1
        required: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out Open Topo Data upstream
        uses: actions/checkout@v4
        with:
          repository: ajnisbet/opentopodata
          ref: ${{ inputs.upstream_ref }}

      - name: Patch OTD (bounded memory + quiet logs)
        run: |
          # Upstream runs uwsgi with --processes = nproc (host core count), so on
          # a big node each concurrent GDAL tile read multiplies memory until the
          # container OOMs. Bound the process count (tunable via N_UWSGI_PROCESSES,
          # default 4) and relax the over-aggressive per-worker reload thresholds.
          sed -i 's/N_UWSGI_THREADS=$(nproc --all)/N_UWSGI_THREADS=${N_UWSGI_PROCESSES:-4}/' docker/run.sh
          sed -i 's/^reload-on-rss = .*/reload-on-rss = 1536/' docker/uwsgi.ini
          sed -i 's/^reload-on-as = .*/reload-on-as = 4096/' docker/uwsgi.ini

          # Quiet the logs: drop upstream's stray debug prints and disable
          # uwsgi's per-request logging (keep 4xx/5xx). The nginx access log is
          # intentionally kept.
          sed -i '/print(f"{xs=}")/d; /print(f"{ys=}")/d; /print(f"{tmp=}")/d' opentopodata/backend.py
          printf '\ndisable-logging = true\nlog-4xx = true\nlog-5xx = true\n' >> docker/uwsgi.ini

          echo "--- run.sh ---"; grep N_UWSGI docker/run.sh
          echo "--- uwsgi.ini ---"; grep -E "reload-on|disable-logging|log-[45]xx" docker/uwsgi.ini
          echo "--- backend prints removed ---"; grep -c 'print(f"{' opentopodata/backend.py || true

      - name: Lowercase owner (GHCR repo names must be lowercase)
        id: owner
        run: echo "name=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ghcr.io/${{ steps.owner.outputs.name }}/opentopodata:${{ inputs.image_tag }}
          labels: org.opencontainers.image.source=https://github.com/${{ github.repository }}

  deploy:
    # Point the ArgoCD opentopodata app at the freshly built image and sync,
    # same pattern as the forwarder.
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o /usr/local/bin/argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x /usr/local/bin/argocd

      - name: Deploy image ${{ inputs.image_tag }} to the opentopodata app
        run: |
          argocd app set opentopodata --helm-set image.tag="$IMAGE_TAG" \
            --server "$ARGOCD_URL" --auth-token "$ARGOCD_TOKEN"
          argocd app sync opentopodata \
            --server "$ARGOCD_URL" --auth-token "$ARGOCD_TOKEN"
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          ARGOCD_URL: ${{ secrets.ARGOCD_URL }}
          ARGOCD_TOKEN: ${{ secrets.ARGOCD_TOKEN }}
