name: Forwarder image

# Build the websocket forwarder image and publish to this repo's GHCR.
# Semver images come from git tags (v1.2.3 -> :1.2.3, immutable); master builds
# a rolling :master + :sha-<short> for testing.
on:
  push:
    branches: [master]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/websocket
          tags: |
            type=semver,pattern={{version}}
            type=ref,event=branch
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    # On a version tag, point the ArgoCD app at the freshly built image and sync.
    # Master pushes only build the rolling image; they don't deploy.
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o /usr/local/bin/argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x /usr/local/bin/argocd

      - name: Deploy image ${{ github.ref_name }} to the websocket app
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          argocd app set websocket --helm-set image.tag="$VERSION" \
            --server "$ARGOCD_URL" --auth-token "$ARGOCD_TOKEN"
          argocd app sync websocket \
            --server "$ARGOCD_URL" --auth-token "$ARGOCD_TOKEN"
        env:
          ARGOCD_URL: ${{ secrets.ARGOCD_URL }}
          ARGOCD_TOKEN: ${{ secrets.ARGOCD_TOKEN }}
